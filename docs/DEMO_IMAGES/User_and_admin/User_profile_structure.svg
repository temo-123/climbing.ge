<polygon points="800,178 791.2574245028778,180.1371414733513 792.1907438608379,173.52612935446737" fill="#e91e63" /><text x="470" y="36" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">User Profile — Addresses · Notifications · Favorites</text>
