<text x="880" y="289" text-anchor="middle" font-size="9" fill="#666">tab = warehouses</text><text x="815" y="305" text-anchor="start" font-size="10" fill="#444">id, name</text>
<text x="815" y="321" text-anchor="start" font-size="10" fill="#444">general (bool)</text>
