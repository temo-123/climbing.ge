<polygon points="615,313 606.0585293646578,314.02474527435487 607.8129310992429,307.5828014051755" fill="#673ab7" /><text x="460" y="36" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Tour System</text>
<text x="145" y="78" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Tour (global)</text>
<text x="145" y="93" text-anchor="middle" font-size="10" fill="#666">tab = tours</text>
<text x="40" y="110" text-anchor="start" font-size="10" fill="#333">id, url_title, published</text>
<text x="40" y="125" text-anchor="start" font-size="10" fill="#333">min_price, category_id</text>
<text x="40" y="140" text-anchor="start" font-size="10" fill="#333">us_tour_id, ka_tour_id, ru_tour_id</text>
<text x="387.5" y="75" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">locale_tour (EN)</text>
<text x="387.5" y="89" text-anchor="middle" font-size="9" fill="#666">tab = locale_tours</text><text x="310" y="105" text-anchor="start" font-size="10" fill="#555">locale = "en"</text>
<text x="310" y="121" text-anchor="start" font-size="10" fill="#555">title, short_description</text>
<text x="310" y="137" text-anchor="start" font-size="10" fill="#555">text, location, duration</text>
<text x="590.5" y="103" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">locale_tour (KA)</text>
<text x="590.5" y="119" text-anchor="middle" font-size="9" fill="#666">tab = locale_tours</text><text x="790" y="75" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Tour Category</text>
<text x="790" y="89" text-anchor="middle" font-size="9" fill="#666">tab = tour_categories</text><text x="715" y="105" text-anchor="start" font-size="10" fill="#555">id, us_name, ka_name</text>
<text x="145" y="240" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Tour Image</text>
<text x="145" y="254" text-anchor="middle" font-size="9" fill="#666">tab = tour_images</text><text x="40" y="270" text-anchor="start" font-size="10" fill="#555">id, tour_id → tours</text>
<text x="40" y="286" text-anchor="start" font-size="10" fill="#555">image, title, num</text>
<text x="425" y="242" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Tour Reservation</text>
<text x="425" y="257" text-anchor="middle" font-size="10" fill="#666">tab = tour_reservations</text>
<text x="310" y="274" text-anchor="start" font-size="10" fill="#333">id, tour_id, name, email</text>
<text x="310" y="289" text-anchor="start" font-size="10" fill="#333">phone, check_in, persons</text>
<text x="310" y="304" text-anchor="start" font-size="10" fill="#333">confirm, verificate</text>
<text x="690" y="240" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">tour_reservation_users</text>
<text x="690" y="254" text-anchor="middle" font-size="9" fill="#666">(pivot)</text><text x="605" y="270" text-anchor="start" font-size="10" fill="#555">reservation_id</text>
<text x="605" y="286" text-anchor="start" font-size="10" fill="#555">user_id → users</text>
<text x="690" y="332" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">user_tours</text>
<text x="690" y="346" text-anchor="middle" font-size="9" fill="#666">(pivot)</text><text x="605" y="359" text-anchor="start" font-size="10" fill="#555">tour_id → tours</text>
<text x="605" y="372" text-anchor="start" font-size="10" fill="#555">user_id → users</text>
</svg>