<polygon points="380,413 376.8737725429165,404.5604086659023 383.548213219368,404.72895514763087" fill="#9c27b0" /><text x="540" y="36" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Guidebook Full Hierarchy</text>
<text x="125" y="75" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Region</text>
<text x="125" y="89" text-anchor="middle" font-size="9" fill="#666">tab = regions</text><text x="40" y="105" text-anchor="start" font-size="10" fill="#333">id, us_name, ka_name</text>
<text x="385" y="78" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Climbing Spot (Article)</text>
<text x="385" y="93" text-anchor="middle" font-size="10" fill="#666">tab = articles</text>
<text x="285" y="110" text-anchor="start" font-size="10" fill="#333">id, url_title, image</text>
<text x="285" y="125" text-anchor="start" font-size="10" fill="#333">map, weather, price_from</text>
<text x="285" y="140" text-anchor="start" font-size="10" fill="#333">mount_route, mount_grade</text>
<text x="285" y="155" text-anchor="start" font-size="10" fill="#333">us_article_id, ka_article_id</text>
<text x="645" y="75" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">locale_articles</text>
<text x="560" y="91" text-anchor="start" font-size="10" fill="#555">id, title</text>
<text x="560" y="107" text-anchor="start" font-size="10" fill="#555">short_description</text>
<text x="560" y="123" text-anchor="start" font-size="10" fill="#555">text, route, how_get</text>
<text x="560" y="139" text-anchor="start" font-size="10" fill="#555">best_time, what_need</text>
<text x="560" y="155" text-anchor="start" font-size="10" fill="#555">info, meta_keyword</text>
<text x="385" y="262" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Sector</text>
<text x="385" y="277" text-anchor="middle" font-size="10" fill="#666">tab = sectors</text>
<text x="285" y="294" text-anchor="start" font-size="10" fill="#333">id, name, article_id</text>
<text x="285" y="309" text-anchor="start" font-size="10" fill="#333">sun/shade/angle flags</text>
<text x="125" y="260" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Route</text>
<text x="125" y="274" text-anchor="middle" font-size="9" fill="#666">tab = routes</text><text x="40" y="290" text-anchor="start" font-size="10" fill="#333">id, sector_id</text>
<text x="40" y="306" text-anchor="start" font-size="10" fill="#333">category (sport/boulder)</text>
<text x="40" y="322" text-anchor="start" font-size="10" fill="#333">grade, name, height</text>
<text x="40" y="338" text-anchor="start" font-size="10" fill="#333">bolts, text_us, text_ka</text>
<text x="645" y="260" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Sector Image</text>
<text x="645" y="274" text-anchor="middle" font-size="9" fill="#666">tab = sector_images</text><text x="560" y="290" text-anchor="start" font-size="10" fill="#555">id, title, image, num</text>
<text x="560" y="306" text-anchor="start" font-size="10" fill="#555">sector_id</text>
<text x="920" y="262" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Multi-Pitch (MTP)</text>
<text x="920" y="277" text-anchor="middle" font-size="10" fill="#666">tab = mtps</text>
<text x="815" y="294" text-anchor="start" font-size="10" fill="#333">id, sector_id, name</text>
<text x="815" y="309" text-anchor="start" font-size="10" fill="#333">text_us, text_ka, height</text>
<text x="920" y="412" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">MTP Pitch</text>
<text x="920" y="427" text-anchor="middle" font-size="10" fill="#666">tab = mtp_pitchs</text>
<text x="815" y="444" text-anchor="start" font-size="10" fill="#333">id, mtp_id, grade, title</text>
<text x="815" y="459" text-anchor="start" font-size="10" fill="#333">text_us, text_ka</text>
<text x="815" y="474" text-anchor="start" font-size="10" fill="#333">height, bolts</text>
<text x="645" y="410" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Mount</text>
<text x="645" y="424" text-anchor="middle" font-size="9" fill="#666">tab = mounts</text><text x="560" y="440" text-anchor="start" font-size="10" fill="#555">id, weather, map</text>
<text x="560" y="456" text-anchor="start" font-size="10" fill="#555">us_mount_id, ka_mount_id</text>
<text x="560" y="472" text-anchor="start" font-size="10" fill="#888">→ locale_mounts</text>
<text x="125" y="440" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Event</text>
<text x="125" y="454" text-anchor="middle" font-size="9" fill="#666">tab = events</text><text x="40" y="470" text-anchor="start" font-size="10" fill="#555">id, us_event_id</text>
<text x="40" y="486" text-anchor="start" font-size="10" fill="#555">→ locale_events</text>
<text x="40" y="502" text-anchor="start" font-size="10" fill="#888">→ interested_events</text>
<text x="385" y="435" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">General Info</text>
<text x="385" y="449" text-anchor="middle" font-size="9" fill="#666">tab = general_infos</text><text x="285" y="465" text-anchor="start" font-size="10" fill="#555">id, title, is_show</text>
<text x="285" y="481" text-anchor="start" font-size="10" fill="#555">text_us, text_ka</text>
<text x="285" y="497" text-anchor="start" font-size="10" fill="#888">→ articles (via pivot: block_action)</text>
</svg>